<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downdetector • Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-purple-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-12">
      <h1 class="text-5xl font-bold tracking-tighter flex items-center gap-3">
        🌐 <span>Downdetector</span>
      </h1>
      <div class="flex items-center gap-3 bg-white/10 px-6 py-3 rounded-full">
        <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
        <span class="font-medium text-sm">LIVE MONITORING</span>
      </div>
    </div>

    <!-- Add Website -->
    <div class="max-w-xl mx-auto mb-12">
      <div class="flex gap-4">
        <input id="newUrl" placeholder="Add any website (e.g. netflix.com, spotify.com)" 
               class="flex-1 bg-white/10 border border-white/20 rounded-3xl px-8 py-6 text-lg focus:outline-none focus:border-white">
        <button onclick="addWebsite()" 
                class="bg-white text-black font-semibold px-10 rounded-3xl hover:bg-indigo-100 transition-all">+ Add</button>
      </div>
    </div>

    <!-- Status Cards -->
    <div id="sitesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <!-- Footer -->
    <div class="text-center mt-20 text-white/60">
      <p class="text-lg">Made by <strong class="text-indigo-400">Aryan Bhalsing</strong></p>
      <div class="flex justify-center gap-8 mt-6 text-2xl">
        <a href="https://www.instagram.com/iam._aryanbhalsing/" target="_blank" class="hover:text-pink-400 transition-colors"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/iamaryanbhalsing" target="_blank" class="hover:text-gray-300 transition-colors"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/iamaryanbhalsing/" target="_blank" class="hover:text-blue-400 transition-colors"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>
  </div>

  <script>
    function addWebsite() {
      const input = document.getElementById('newUrl');
      const url = input.value.trim();
      if (!url) return alert("Please enter a website URL");

      const form = new FormData();
      form.append('url', url);

      fetch('/add_site', {
        method: 'POST',
        body: form
      }).then(() => {
        input.value = '';
        setTimeout(() => location.reload(), 800); // Small delay to show new site
      });
    }

    // Auto refresh every 8 seconds
    setInterval(() => location.reload(), 8000);

    // Initial Load
    window.onload = () => {
      fetch('/history')
        .then(r => r.json())
        .then(data => {
          const container = document.getElementById('sitesContainer');
          container.innerHTML = '';

          data.websites.forEach(url => {
            const info = data.status_data[url] || {status: "Checking...", last_check: "—"};

            const card = document.createElement('div');
            card.className = "bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-8 hover:border-indigo-400 transition-all";
            card.innerHTML = `
              <h3 class="text-xl font-medium mb-3">${url}</h3>
              <p class="text-5xl font-bold ${info.status === 'UP' ? 'text-emerald-400' : 'text-red-400'}">
                ${info.status}
              </p>
              <p class="text-white/60 text-sm mt-2">${info.last_check}</p>
            `;
            container.appendChild(card);
          });
        });
    };
  </script>
</body>
</html>
